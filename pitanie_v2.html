<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Питание — Алексей</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232734;
  --border: #2e3345;
  --text: #e8eaf0;
  --text2: #8b90a0;
  --accent: #4ecdc4;
  --accent2: #45b7aa;
  --protein: #ff6b6b;
  --fat: #feca57;
  --carbs: #54a0ff;
  --fiber: #5cd85c;
  --kcal: #ff9f43;
  --danger: #ee5a5a;
  --success: #2ed573;
  --warning: #ffa502;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px;
  padding-bottom: 90px;
}

/* Header */
.header {
  text-align: center;
  padding: 20px 0 16px;
}

.header h1 {
  font-size: 22px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}

.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 12px;
}

.date-nav button {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  width: 36px;
  height: 36px;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.date-nav button:hover { background: var(--surface2); }

.date-display {
  font-size: 15px;
  font-weight: 600;
  color: var(--text2);
  min-width: 180px;
  text-align: center;
}

.date-today { color: var(--accent) !important; }

/* Progress Cards */
.progress-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 16px;
}

.progress-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  position: relative;
  overflow: hidden;
}

.progress-card.full-width {
  grid-column: 1 / -1;
}

.progress-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text2);
  margin-bottom: 4px;
}

.progress-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 500;
}

.progress-target {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}

.progress-bar-bg {
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}

.c-kcal .progress-value { color: var(--kcal); }
.c-kcal .progress-bar-fill { background: var(--kcal); }
.c-protein .progress-value { color: var(--protein); }
.c-protein .progress-bar-fill { background: var(--protein); }
.c-fat .progress-value { color: var(--fat); }
.c-fat .progress-bar-fill { background: var(--fat); }
.c-carbs .progress-value { color: var(--carbs); }
.c-carbs .progress-bar-fill { background: var(--carbs); }
.c-fiber .progress-value { color: var(--fiber); }
.c-fiber .progress-bar-fill { background: var(--fiber); }

/* Sections */
.section-title {
  font-size: 15px;
  font-weight: 700;
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Meal Log */
.meal-entry {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
}

.meal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.meal-time {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
}

.meal-kcal {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--kcal);
}

.meal-items {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
}

.meal-macros {
  display: flex;
  gap: 10px;
  margin-top: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

.meal-macros span { display: flex; align-items: center; gap: 3px; }
.macro-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
}

.meal-delete {
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  opacity: 0.5;
  transition: all 0.2s;
}

.meal-delete:hover { opacity: 1; color: var(--danger); }

/* Add Meal Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  backdrop-filter: blur(4px);
}

.modal-overlay.active { display: flex; align-items: flex-end; justify-content: center; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 20px;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-close {
  background: var(--surface2);
  border: none;
  color: var(--text);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  font-size: 18px;
  cursor: pointer;
}

/* Search */
.search-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border 0.2s;
}

.search-input:focus { border-color: var(--accent); }

.search-input::placeholder { color: var(--text2); }

/* Product List */
.product-list {
  margin-top: 12px;
  max-height: 250px;
  overflow-y: auto;
}

.product-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s;
}

.product-item:hover { background: var(--surface2); }

.product-name {
  font-size: 14px;
  font-weight: 600;
}

.product-info {
  font-size: 11px;
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
}

/* Portion selector */
.portion-section {
  display: none;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.portion-section.active { display: block; }

.selected-product-name {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 12px;
}

.portion-presets {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}

.portion-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-family: 'Nunito', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.portion-btn:hover, .portion-btn.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

.gram-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.gram-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  outline: none;
  text-align: center;
}

.gram-input:focus { border-color: var(--accent); }

.gram-unit {
  font-size: 14px;
  color: var(--text2);
  font-weight: 600;
}

.portion-preview {
  margin-top: 12px;
  background: var(--bg);
  border-radius: 10px;
  padding: 10px;
  display: flex;
  justify-content: space-around;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.time-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 12px;
}

.time-input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  outline: none;
}

.time-input:focus { border-color: var(--accent); }

.add-meal-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 12px;
  padding: 14px;
  color: var(--bg);
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 12px;
  transition: opacity 0.2s;
}

.add-meal-btn:hover { opacity: 0.9; }

/* FAB */
.fab {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  color: var(--bg);
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(78, 205, 196, 0.4);
  z-index: 50;
  transition: transform 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.fab:hover { transform: translateX(-50%) scale(1.1); }

/* Bottom toolbar */
.toolbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  z-index: 40;
}

.tool-btn {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 10px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 4px 12px;
  transition: color 0.2s;
}

.tool-btn:hover, .tool-btn.active { color: var(--accent); }

.tool-icon { font-size: 20px; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text2);
}

.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* Product Manager */
.product-manager { display: none; }
.product-manager.active { display: block; }

.new-product-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.form-group.full { grid-column: 1 / -1; }

.form-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  outline: none;
}

.form-input:focus { border-color: var(--accent); }

.save-product-btn {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  padding: 10px;
  color: var(--bg);
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 12px;
}

/* Export panel */
.export-panel { display: none; }
.export-panel.active { display: block; }

.export-btn {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 8px;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color 0.2s;
}

.export-btn:hover { border-color: var(--accent); }

.export-btn .icon { font-size: 20px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--success);
  color: var(--bg);
  padding: 10px 20px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 13px;
  z-index: 200;
  transition: transform 0.3s ease;
}

.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <h1>🍽️ Мой рацион</h1>
    <div class="date-nav">
      <button onclick="changeDate(-1)">◀</button>
      <div class="date-display" id="dateDisplay"></div>
      <button onclick="changeDate(1)">▶</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-grid" id="progressGrid">
    <div class="progress-card full-width c-kcal">
      <div class="progress-label">Калории</div>
      <div class="progress-value" id="pKcal">0</div>
      <div class="progress-target" id="pKcalTarget">/ 2050 ккал</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="bKcal" style="width:0%"></div></div>
    </div>
    <div class="progress-card c-protein">
      <div class="progress-label">Белки</div>
      <div class="progress-value" id="pProtein">0</div>
      <div class="progress-target">/ 145г</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="bProtein" style="width:0%"></div></div>
    </div>
    <div class="progress-card c-fat">
      <div class="progress-label">Жиры</div>
      <div class="progress-value" id="pFat">0</div>
      <div class="progress-target">/ 68г</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="bFat" style="width:0%"></div></div>
    </div>
    <div class="progress-card c-carbs">
      <div class="progress-label">Углеводы</div>
      <div class="progress-value" id="pCarbs">0</div>
      <div class="progress-target">/ 190г</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="bCarbs" style="width:0%"></div></div>
    </div>
    <div class="progress-card c-fiber">
      <div class="progress-label">Клетчатка</div>
      <div class="progress-value" id="pFiber">0</div>
      <div class="progress-target">/ 32г</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="bFiber" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Meals -->
  <div id="mealsView">
    <div class="section-title">📋 Приёмы пищи</div>
    <div id="mealsList"></div>
  </div>

  <!-- Product Manager -->
  <div class="product-manager" id="productManager">
    <div class="section-title">📦 Мои продукты</div>
    <div class="new-product-form">
      <div class="form-group full">
        <label class="form-label">Название</label>
        <input class="form-input" id="npName" placeholder="Например: Скумбрия запечённая">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ккал / 100г</label>
          <input class="form-input" id="npKcal" type="number" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Белки / 100г</label>
          <input class="form-input" id="npProtein" type="number" step="0.1" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Жиры / 100г</label>
          <input class="form-input" id="npFat" type="number" step="0.1" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Углеводы / 100г</label>
          <input class="form-input" id="npCarbs" type="number" step="0.1" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Клетчатка / 100г</label>
          <input class="form-input" id="npFiber" type="number" step="0.1" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Порция (г)</label>
          <input class="form-input" id="npPortion" type="number" placeholder="100">
        </div>
      </div>
      <button class="save-product-btn" onclick="saveNewProduct()">+ Добавить продукт</button>
    </div>
    <div id="productCatalog"></div>
  </div>

  <!-- Export -->
  <div class="export-panel" id="exportPanel">
    <div class="section-title">📤 Данные</div>
    <button class="export-btn" onclick="exportForChat()">
      <span class="icon">📋</span> Скопировать сегодня
    </button>
    <button class="export-btn" onclick="togglePeriodPanel()">
      <span class="icon">📅</span> Скопировать за период
    </button>
    <div id="periodPanel" style="display:none;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <div style="flex:1">
          <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px">С</div>
          <input type="date" id="periodFrom" class="form-input" style="width:100%;font-size:13px">
        </div>
        <div style="flex:1">
          <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px">По</div>
          <input type="date" id="periodTo" class="form-input" style="width:100%;font-size:13px">
        </div>
      </div>
      <div id="periodPreview" style="font-size:12px;color:var(--text2);margin-bottom:10px;min-height:18px"></div>
      <button class="export-btn" onclick="exportPeriod()" style="margin-bottom:0;justify-content:center;background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700">
        Скопировать текст
      </button>
    </div>
    <button class="export-btn" onclick="exportJSON()">
      <span class="icon">💾</span> Скачать всю базу (JSON)
    </button>
    <button class="export-btn" onclick="importJSON()">
      <span class="icon">📥</span> Импорт данных (JSON)
    </button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn" onclick="openAddModal()">+</button>

<!-- Toolbar -->
<div class="toolbar">
  <button class="tool-btn active" id="tabMeals" onclick="switchTab('meals')">
    <span class="tool-icon">📋</span>Дневник
  </button>
  <button class="tool-btn" id="tabProducts" onclick="switchTab('products')">
    <span class="tool-icon">📦</span>Продукты
  </button>
  <button class="tool-btn" id="tabExport" onclick="switchTab('export')">
    <span class="tool-icon">📤</span>Данные
  </button>
</div>

<!-- Add Meal Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>
      Добавить еду
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </h2>
    <input class="search-input" id="searchInput" placeholder="Поиск продукта..." oninput="filterProducts()">
    <div class="product-list" id="productListModal"></div>
    <div class="portion-section" id="portionSection">
      <div class="selected-product-name" id="selectedProductName"></div>
      <div class="portion-presets" id="portionPresets"></div>
      <div class="gram-input-row">
        <input class="gram-input" id="gramInput" type="number" placeholder="150" oninput="updatePreview()">
        <span class="gram-unit">г</span>
      </div>
      <div class="portion-preview" id="portionPreview">
        <span style="color:var(--kcal)">0 ккал</span>
        <span style="color:var(--protein)">0 Б</span>
        <span style="color:var(--fat)">0 Ж</span>
        <span style="color:var(--carbs)">0 У</span>
        <span style="color:var(--fiber)">0 Кл</span>
      </div>
      <div class="time-input-row">
        <span class="gram-unit">Время:</span>
        <input class="time-input" id="timeInput" type="time">
      </div>
      <button class="add-meal-btn" onclick="addMealEntry()">✓ Добавить</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

const GOALS = { kcal: 2050, protein: 145, fat: 68, carbs: 190, fiber: 32 };

// ==================== STATE ====================
let currentDate = getTodayStr();
let selectedProduct = null;
let allProducts = [];
let allMeals = {};

function getTodayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function loadData() {
  try {
    const savedProducts = localStorage.getItem('ap_products');
    const savedMeals = localStorage.getItem('ap_meals');
    allProducts = savedProducts ? JSON.parse(savedProducts) : [...DEFAULT_PRODUCTS];
    allMeals = savedMeals ? JSON.parse(savedMeals) : {};
    if (!savedProducts) saveProducts();
  } catch(e) {
    allProducts = [...DEFAULT_PRODUCTS];
    allMeals = {};
  }
}

function saveProducts() {
  localStorage.setItem('ap_products', JSON.stringify(allProducts));
}

function saveMeals() {
  localStorage.setItem('ap_meals', JSON.stringify(allMeals));
}

// ==================== DATE NAV ====================
function formatDateDisplay(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
  const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
  const dayName = days[d.getDay()];
  const day = d.getDate();
  const month = months[d.getMonth()];
  return `${dayName}, ${day} ${month}`;
}

function changeDate(delta) {
  const d = new Date(currentDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.toISOString().slice(0, 10);
  render();
}

// ==================== RENDERING ====================
function render() {
  const display = document.getElementById('dateDisplay');
  display.textContent = formatDateDisplay(currentDate);
  display.className = 'date-display' + (currentDate === getTodayStr() ? ' date-today' : '');

  const meals = allMeals[currentDate] || [];
  const totals = { kcal: 0, protein: 0, fat: 0, carbs: 0, fiber: 0 };

  meals.forEach(m => {
    totals.kcal += m.kcal;
    totals.protein += m.protein;
    totals.fat += m.fat;
    totals.carbs += m.carbs;
    totals.fiber += m.fiber;
  });

  updateProgress('pKcal', 'bKcal', totals.kcal, GOALS.kcal, 'ккал');
  updateProgress('pProtein', 'bProtein', totals.protein, GOALS.protein, 'г');
  updateProgress('pFat', 'bFat', totals.fat, GOALS.fat, 'г');
  updateProgress('pCarbs', 'bCarbs', totals.carbs, GOALS.carbs, 'г');
  updateProgress('pFiber', 'bFiber', totals.fiber, GOALS.fiber, 'г');

  renderMeals(meals);
}

function updateProgress(valueId, barId, current, goal, unit) {
  const val = Math.round(current * 10) / 10;
  document.getElementById(valueId).textContent = val + unit;
  const pct = Math.min(100, (current / goal) * 100);
  document.getElementById(barId).style.width = pct + '%';
}

function renderMeals(meals) {
  const container = document.getElementById('mealsList');
  if (meals.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🍽️</div><p>Нажми + чтобы добавить еду</p></div>';
    return;
  }

  const sorted = [...meals].sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  container.innerHTML = sorted.map((m, i) => `
    <div class="meal-entry">
      <div class="meal-header">
        <span class="meal-time">${m.time || '--:--'}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="meal-kcal">${Math.round(m.kcal)} ккал</span>
          <button class="meal-delete" onclick="deleteMeal(${i})">✕</button>
        </div>
      </div>
      <div class="meal-items">${m.name} — ${m.grams}г</div>
      <div class="meal-macros">
        <span><span class="macro-dot" style="background:var(--protein)"></span>${m.protein.toFixed(1)}Б</span>
        <span><span class="macro-dot" style="background:var(--fat)"></span>${m.fat.toFixed(1)}Ж</span>
        <span><span class="macro-dot" style="background:var(--carbs)"></span>${m.carbs.toFixed(1)}У</span>
        <span><span class="macro-dot" style="background:var(--fiber)"></span>${m.fiber.toFixed(1)}Кл</span>
      </div>
    </div>
  `).join('');
}

function deleteMeal(index) {
  const meals = allMeals[currentDate] || [];
  const sorted = [...meals].sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  const original = meals.indexOf(sorted[index]);
  if (original > -1) {
    meals.splice(original, 1);
    saveMeals();
    render();
    showToast('Удалено');
  }
}

// ==================== ADD MEAL ====================
function openAddModal() {
  document.getElementById('addModal').classList.add('active');
  document.getElementById('searchInput').value = '';
  document.getElementById('portionSection').classList.remove('active');
  selectedProduct = null;
  filterProducts();
  document.getElementById('searchInput').focus();
  const now = new Date();
  document.getElementById('timeInput').value = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
}

function filterProducts() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('productListModal');

  let filtered = allProducts;
  if (query) {
    filtered = allProducts.filter(p => p.name.toLowerCase().includes(query) || (p.category && p.category.toLowerCase().includes(query)));
  }

  // Group by category
  const groups = {};
  filtered.forEach(p => {
    const cat = p.category || 'Другое';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(p);
  });

  let html = '';
  Object.keys(groups).forEach(cat => {
    html += `<div style="font-size:11px;font-weight:700;color:var(--text2);padding:8px 12px 4px;text-transform:uppercase;letter-spacing:0.5px">${cat}</div>`;
    groups[cat].forEach(p => {
      const info = `${p.per100.kcal} ккал · ${p.per100.protein}Б`;
      html += `<div class="product-item" onclick="selectProduct('${p.id}')">
        <span class="product-name">${p.name}</span>
        <span class="product-info">${info}</span>
      </div>`;
    });
  });

  list.innerHTML = html;
}

function selectProduct(id) {
  selectedProduct = allProducts.find(p => p.id === id);
  if (!selectedProduct) return;

  document.getElementById('portionSection').classList.add('active');
  document.getElementById('selectedProductName').textContent = selectedProduct.name;
  document.getElementById('gramInput').value = selectedProduct.portion;

  // Presets
  const presets = document.getElementById('portionPresets');
  const portions = [
    { label: '25%', mult: 0.25 },
    { label: '50%', mult: 0.5 },
    { label: '1 порция', mult: 1 },
    { label: '150г', grams: 150 },
    { label: '200г', grams: 200 },
  ];

  presets.innerHTML = portions.map(p => {
    const g = p.grams || Math.round(selectedProduct.portion * p.mult);
    return `<button class="portion-btn" onclick="setGrams(${g})">${p.label} (${g}г)</button>`;
  }).join('');

  updatePreview();
}

function setGrams(g) {
  document.getElementById('gramInput').value = g;
  updatePreview();
}

function updatePreview() {
  if (!selectedProduct) return;
  const grams = parseFloat(document.getElementById('gramInput').value) || 0;
  const mult = grams / 100;
  const p = selectedProduct.per100;

  document.getElementById('portionPreview').innerHTML = `
    <span style="color:var(--kcal)">${Math.round(p.kcal * mult)} ккал</span>
    <span style="color:var(--protein)">${(p.protein * mult).toFixed(1)} Б</span>
    <span style="color:var(--fat)">${(p.fat * mult).toFixed(1)} Ж</span>
    <span style="color:var(--carbs)">${(p.carbs * mult).toFixed(1)} У</span>
    <span style="color:var(--fiber)">${(p.fiber * mult).toFixed(1)} Кл</span>
  `;
}

function addMealEntry() {
  if (!selectedProduct) return;
  const grams = parseFloat(document.getElementById('gramInput').value) || 0;
  if (grams <= 0) return;

  const time = document.getElementById('timeInput').value || '--:--';
  const mult = grams / 100;
  const p = selectedProduct.per100;

  const entry = {
    name: selectedProduct.name,
    grams: grams,
    time: time,
    kcal: Math.round(p.kcal * mult * 10) / 10,
    protein: Math.round(p.protein * mult * 10) / 10,
    fat: Math.round(p.fat * mult * 10) / 10,
    carbs: Math.round(p.carbs * mult * 10) / 10,
    fiber: Math.round(p.fiber * mult * 10) / 10,
  };

  if (!allMeals[currentDate]) allMeals[currentDate] = [];
  allMeals[currentDate].push(entry);
  saveMeals();

  closeAddModal();
  render();
  showToast(`${selectedProduct.name} добавлен`);
}

// ==================== PRODUCT MANAGER ====================
function renderProductCatalog() {
  const container = document.getElementById('productCatalog');
  const groups = {};
  allProducts.forEach(p => {
    const cat = p.category || 'Другое';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(p);
  });

  let html = '';
  Object.keys(groups).forEach(cat => {
    html += `<div style="font-size:11px;font-weight:700;color:var(--text2);padding:12px 0 6px;text-transform:uppercase;letter-spacing:0.5px">${cat}</div>`;
    groups[cat].forEach(p => {
      const isCustom = !DEFAULT_PRODUCTS.find(dp => dp.id === p.id);
      html += `<div class="meal-entry" style="margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;font-weight:600">${p.name}</span>
          ${isCustom ? `<button class="meal-delete" onclick="deleteProduct('${p.id}')">✕</button>` : ''}
        </div>
        <div style="font-family:'JetBrains Mono';font-size:11px;color:var(--text2);margin-top:4px">
          На 100г: ${p.per100.kcal} ккал · ${p.per100.protein}Б · ${p.per100.fat}Ж · ${p.per100.carbs}У · ${p.per100.fiber}Кл
        </div>
        ${p.note ? `<div style="font-size:11px;color:var(--accent);margin-top:2px">${p.note}</div>` : ''}
      </div>`;
    });
  });

  container.innerHTML = html;
}

function saveNewProduct() {
  const name = document.getElementById('npName').value.trim();
  if (!name) { showToast('Введи название'); return; }

  const product = {
    id: 'custom_' + Date.now(),
    name: name,
    per100: {
      kcal: parseFloat(document.getElementById('npKcal').value) || 0,
      protein: parseFloat(document.getElementById('npProtein').value) || 0,
      fat: parseFloat(document.getElementById('npFat').value) || 0,
      carbs: parseFloat(document.getElementById('npCarbs').value) || 0,
      fiber: parseFloat(document.getElementById('npFiber').value) || 0,
    },
    portion: parseFloat(document.getElementById('npPortion').value) || 100,
    category: 'Пользовательские'
  };

  allProducts.push(product);
  saveProducts();
  renderProductCatalog();

  // Clear form
  ['npName','npKcal','npProtein','npFat','npCarbs','npFiber','npPortion'].forEach(id => document.getElementById(id).value = '');
  showToast(`${name} добавлен в базу`);
}

function deleteProduct(id) {
  allProducts = allProducts.filter(p => p.id !== id);
  saveProducts();
  renderProductCatalog();
  showToast('Продукт удалён');
}

// ==================== TABS ====================
function switchTab(tab) {
  document.getElementById('mealsView').style.display = tab === 'meals' ? 'block' : 'none';
  document.getElementById('productManager').className = 'product-manager' + (tab === 'products' ? ' active' : '');
  document.getElementById('exportPanel').className = 'export-panel' + (tab === 'export' ? ' active' : '');
  document.getElementById('fabBtn').style.display = tab === 'meals' ? 'flex' : 'none';

  ['tabMeals', 'tabProducts', 'tabExport'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');

  if (tab === 'products') renderProductCatalog();
}

// ==================== EXPORT ====================
function exportJSON() {
  const data = { products: allProducts, meals: allMeals, goals: GOALS, exported: new Date().toISOString() };
  downloadFile(JSON.stringify(data, null, 2), 'pitanie_backup_' + currentDate + '.json', 'application/json');
  showToast('Резервная копия скачана');
}

function formatDayText(dateStr) {
  const meals = allMeals[dateStr] || [];
  if (meals.length === 0) return '';

  const totals = meals.reduce((t, m) => {
    t.kcal += m.kcal; t.protein += m.protein; t.fat += m.fat; t.carbs += m.carbs; t.fiber += m.fiber;
    return t;
  }, { kcal: 0, protein: 0, fat: 0, carbs: 0, fiber: 0 });

  let text = `📅 ${formatDateDisplay(dateStr)}\n`;
  text += `Приёмы пищи:\n`;
  meals.forEach(m => {
    text += `${m.time} — ${m.name} (${m.grams}г): ${Math.round(m.kcal)} ккал, Б:${m.protein.toFixed(1)}, Ж:${m.fat.toFixed(1)}, У:${m.carbs.toFixed(1)}, Кл:${m.fiber.toFixed(1)}\n`;
  });
  text += `ИТОГ: ${Math.round(totals.kcal)} ккал, Б:${totals.protein.toFixed(1)}г, Ж:${totals.fat.toFixed(1)}г, У:${totals.carbs.toFixed(1)}г, Кл:${totals.fiber.toFixed(1)}г\n`;
  return text;
}

function exportForChat() {
  const today = getTodayStr();
  const meals = allMeals[today] || [];
  if (meals.length === 0) { showToast('Нет данных за сегодня'); return; }

  let text = formatDayText(today);
  text += `ЦЕЛИ: ${GOALS.kcal} ккал, Б:${GOALS.protein}г, Ж:${GOALS.fat}г, У:${GOALS.carbs}г, Кл:${GOALS.fiber}г`;

  copyToClipboard(text, 'Сегодняшний день скопирован!');
}

function togglePeriodPanel() {
  const panel = document.getElementById('periodPanel');
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) {
    const today = getTodayStr();
    const weekAgo = new Date();
    weekAgo.setDate(weekAgo.getDate() - 7);
    document.getElementById('periodFrom').value = weekAgo.toISOString().slice(0, 10);
    document.getElementById('periodTo').value = today;
    updatePeriodPreview();
  }
}

function updatePeriodPreview() {
  const from = document.getElementById('periodFrom').value;
  const to = document.getElementById('periodTo').value;
  if (!from || !to) return;

  let count = 0;
  const d = new Date(from + 'T12:00:00');
  const end = new Date(to + 'T12:00:00');
  while (d <= end) {
    const key = d.toISOString().slice(0, 10);
    if (allMeals[key] && allMeals[key].length > 0) count++;
    d.setDate(d.getDate() + 1);
  }
  document.getElementById('periodPreview').textContent = `Найдено дней с данными: ${count}`;
}

// Add event listeners for period inputs
document.addEventListener('DOMContentLoaded', function() {
  const pFrom = document.getElementById('periodFrom');
  const pTo = document.getElementById('periodTo');
  if (pFrom) pFrom.addEventListener('change', updatePeriodPreview);
  if (pTo) pTo.addEventListener('change', updatePeriodPreview);
});

function exportPeriod() {
  const from = document.getElementById('periodFrom').value;
  const to = document.getElementById('periodTo').value;
  if (!from || !to) { showToast('Выберите даты'); return; }
  if (from > to) { showToast('Дата «С» должна быть раньше «По»'); return; }

  let text = '';
  let totalDays = 0;
  const grandTotals = { kcal: 0, protein: 0, fat: 0, carbs: 0, fiber: 0 };

  const d = new Date(from + 'T12:00:00');
  const end = new Date(to + 'T12:00:00');

  while (d <= end) {
    const key = d.toISOString().slice(0, 10);
    const dayText = formatDayText(key);
    if (dayText) {
      text += dayText + '\n';
      totalDays++;
      const meals = allMeals[key] || [];
      meals.forEach(m => {
        grandTotals.kcal += m.kcal;
        grandTotals.protein += m.protein;
        grandTotals.fat += m.fat;
        grandTotals.carbs += m.carbs;
        grandTotals.fiber += m.fiber;
      });
    }
    d.setDate(d.getDate() + 1);
  }

  if (totalDays === 0) { showToast('Нет данных за этот период'); return; }

  text += `━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
  text += `СРЕДНЕЕ ЗА ${totalDays} ДНЕЙ: ${Math.round(grandTotals.kcal / totalDays)} ккал, Б:${(grandTotals.protein / totalDays).toFixed(1)}г, Ж:${(grandTotals.fat / totalDays).toFixed(1)}г, У:${(grandTotals.carbs / totalDays).toFixed(1)}г, Кл:${(grandTotals.fiber / totalDays).toFixed(1)}г\n`;
  text += `ЦЕЛИ: ${GOALS.kcal} ккал, Б:${GOALS.protein}г, Ж:${GOALS.fat}г, У:${GOALS.carbs}г, Кл:${GOALS.fiber}г`;

  copyToClipboard(text, `Период скопирован (${totalDays} дней)`);
}

function copyToClipboard(text, successMsg) {
  navigator.clipboard.writeText(text).then(() => showToast(successMsg)).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(successMsg);
  });
}

function importJSON() {
  document.getElementById('importFile').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.products) { allProducts = data.products; saveProducts(); }
      if (data.meals) { allMeals = data.meals; saveMeals(); }
      render();
      showToast('Данные импортированы!');
    } catch(err) {
      showToast('Ошибка файла');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type: type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// ==================== TOAST ====================
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ==================== INIT ====================
loadData();
render();
</script>
